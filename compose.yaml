services:
  meshseer:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MESHSEER_BIND_HOST: 0.0.0.0
      MESHSEER_BIND_PORT: 8000
      MESHSEER_DB_PATH: /data/meshseer.db
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - meshseer-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  meshseer-data:
